<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netball Vision - Court Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  
  <!-- Babel (translates React JSX into browser-readable JS) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Vanilla Lucide Icons (Stable Browser Build) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  
  <!-- The app will be injected here -->
  <div id="root"></div>

  <!-- App Logic -->
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    // Custom Icon Wrapper to safely render vanilla Lucide icons in React without UMD crashes
    const Icon = ({ name, size = 24, className = "" }) => {
      const spanRef = useRef(null);
      
      useEffect(() => {
        if (spanRef.current && window.lucide) {
          spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          window.lucide.createIcons({
            root: spanRef.current,
            attrs: {
              width: size,
              height: size
            }
          });
        }
      }, [name, size]);

      return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`} />;
    };

    const COURT_WIDTH = 30.5;
    const COURT_HEIGHT = 15.25;
    const ASPECT_RATIO = COURT_WIDTH / COURT_HEIGHT;

    // --- Helper: Generate Color Gradient (Blue -> Green -> Yellow -> Orange -> Red) ---
    const createGradientPalette = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 1;
      const ctx = canvas.getContext('2d');
      
      const grad = ctx.createLinearGradient(0, 0, 256, 0);
      grad.addColorStop(0.0, 'rgba(0, 0, 255, 0)');     
      grad.addColorStop(0.1, 'rgba(0, 0, 255, 0.8)');   
      grad.addColorStop(0.35, 'rgba(0, 255, 0, 0.9)');  
      grad.addColorStop(0.55, 'rgba(255, 255, 0, 0.9)');
      grad.addColorStop(0.75, 'rgba(255, 165, 0, 0.9)');
      grad.addColorStop(1.0, 'rgba(255, 0, 0, 1.0)');   

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 1);
      return ctx.getImageData(0, 0, 256, 1).data;
    };

    // --- Helper: Draw Netball Court ---
    const drawCourt = (ctx, width, height) => {
      const scale = width / COURT_WIDTH;
      const lineColor = 'rgba(255, 255, 255, 0.8)';
      const courtColor = '#1e293b'; // Slate 800 to match dashboard, keeps it clean

      // Background
      ctx.fillStyle = courtColor;
      ctx.fillRect(0, 0, width, height);

      ctx.lineWidth = 2;
      ctx.strokeStyle = lineColor;
      ctx.lineCap = 'round';

      const X = (val) => val * scale;
      const Y = (val) => val * scale;
      
      // Outer boundary
      ctx.strokeRect(X(0), Y(0), X(COURT_WIDTH), Y(COURT_HEIGHT));

      // Transverse Lines (dividing into thirds: 10.166m each)
      const third = COURT_WIDTH / 3;
      ctx.beginPath();
      ctx.moveTo(X(third), Y(0));
      ctx.lineTo(X(third), Y(COURT_HEIGHT));
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(X(third * 2), Y(0));
      ctx.lineTo(X(third * 2), Y(COURT_HEIGHT));
      ctx.stroke();

      // Center Circle (Radius 0.9m)
      ctx.beginPath();
      ctx.arc(X(COURT_WIDTH / 2), Y(COURT_HEIGHT / 2), X(0.9), 0, Math.PI * 2);
      ctx.stroke();

      // Goal Circles (Semi-circles, Radius 4.9m)
      // Left Goal Circle
      ctx.beginPath();
      ctx.arc(X(0), Y(COURT_HEIGHT / 2), X(4.9), -Math.PI / 2, Math.PI / 2);
      ctx.stroke();

      // Right Goal Circle (Fixed facing inwards)
      ctx.beginPath();
      ctx.arc(X(COURT_WIDTH), Y(COURT_HEIGHT / 2), X(4.9), Math.PI / 2, 3 * Math.PI / 2);
      ctx.stroke();
      
      // Goal Posts (Highlighted icons)
      ctx.fillStyle = '#f59e0b'; // Amber-500
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.arc(X(0), Y(COURT_HEIGHT / 2), X(0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(X(COURT_WIDTH), Y(COURT_HEIGHT / 2), X(0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    };

    function App() {
      // Player metadata
      const [metadata, setMetadata] = useState({
          playerName: '',
          observerName: '',
          position: 'C'
      });

      const [scoringDirection, setScoringDirection] = useState('right');

      const [strokes, setStrokes] = useState([]); 
      const [events, setEvents] = useState([]); // { type, x, y, timestamp }
      const [showHeatmap, setShowHeatmap] = useState(false);
      
      const [isDrawingMode, setIsDrawingMode] = useState(true); 
      const [showTrace, setShowTrace] = useState(true); 
      
      const [stats, setStats] = useState({ 
        distance: 0, 
        totalPasses: 0, passSuccess: 0, passFail: 0, passAcc: '0%', 
        totalShots: 0, shotSuccess: 0, shotFail: 0, shotAcc: '0%', 
        ints: 0 
      });

      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const isDraggingRef = useRef(false);
      const lastPointRef = useRef(null);
      
      const palette = useMemo(() => createGradientPalette(), []);

      // --- Calculations ---
      useEffect(() => {
        let totalDist = 0;

        // Calculate Distance
        strokes.forEach(stroke => {
            if (stroke.length < 2) return;
            for (let i = 1; i < stroke.length; i++) {
                const p1 = stroke[i-1];
                const p2 = stroke[i];
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                totalDist += Math.sqrt(dx*dx + dy*dy);
            }
        });

        // Calculate Event Stats
        const passSuccess = events.filter(e => e.type === 'pass_success').length;
        const passFail = events.filter(e => e.type === 'pass_fail').length;
        const totalPasses = passSuccess + passFail;
        
        const shotSuccess = events.filter(e => e.type === 'shot_success').length;
        const shotFail = events.filter(e => e.type === 'shot_fail').length;
        const totalShots = shotSuccess + shotFail;
        
        const ints = events.filter(e => e.type === 'intercept').length;

        setStats({
            distance: Math.round(totalDist),
            totalPasses, passSuccess, passFail,
            passAcc: totalPasses > 0 ? `${Math.round((passSuccess / totalPasses) * 100)}%` : '-',
            totalShots, shotSuccess, shotFail,
            shotAcc: totalShots > 0 ? `${Math.round((shotSuccess / totalShots) * 100)}%` : '-',
            ints: ints
        });

      }, [strokes, events]);

      // --- Actions ---
      const handleDownload = () => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const link = document.createElement('a');
          link.download = `netball-${metadata.playerName || 'analysis'}.png`;
          link.href = canvas.toDataURL();
          link.click();
      };

      const handleClear = () => {
          setStrokes([]);
          setEvents([]);
          setShowHeatmap(false);
          setIsDrawingMode(true);
          setShowTrace(true);
          lastPointRef.current = null;
      };

      const logEvent = (type) => {
          // Use last known drawn point, or default to center of the court
          const pos = lastPointRef.current || { x: COURT_WIDTH / 2, y: COURT_HEIGHT / 2 };
          setEvents(prev => [...prev, { ...pos, type, t: Date.now() }]);
      };

      // --- Interactive Drawing Handlers ---
      const getCourtCoordinates = (clientX, clientY) => {
        const canvas = canvasRef.current;
        if (!canvas) return null;
        
        const rect = canvas.getBoundingClientRect();
        const MARGIN_TOP = 50;
        const MARGIN_BOTTOM = 80; // For stats export footer

        const x = clientX - rect.left;
        const y = clientY - rect.top - MARGIN_TOP; 
        
        const courtDisplayHeight = rect.height - MARGIN_TOP - MARGIN_BOTTOM;
        
        const courtX = (x / rect.width) * COURT_WIDTH;
        const courtY = (y / courtDisplayHeight) * COURT_HEIGHT;
        
        return { 
            x: Math.max(0, Math.min(COURT_WIDTH, courtX)), 
            y: Math.max(0, Math.min(COURT_HEIGHT, courtY)),
            t: Date.now()
        };
      };

      const handleStart = (e) => {
        if (!isDrawingMode) return;
        if (showHeatmap) setShowHeatmap(false);

        isDraggingRef.current = true;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const coords = getCourtCoordinates(clientX, clientY);
        if (coords) {
            setStrokes(prev => [...prev, [coords]]);
            lastPointRef.current = coords;
        }
      };

      const handleMove = (e) => {
        if (!isDrawingMode || !isDraggingRef.current) return;
        if(e.cancelable && e.type === 'touchmove') e.preventDefault();

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const coords = getCourtCoordinates(clientX, clientY);
        
        if (coords) {
            if (lastPointRef.current) {
                const dx = coords.x - lastPointRef.current.x;
                const dy = coords.y - lastPointRef.current.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 0.2) return; // Throttled sampling distance
            }

            setStrokes(prev => {
                const newStrokes = [...prev];
                const currentStroke = newStrokes[newStrokes.length - 1];
                if (currentStroke) {
                    newStrokes[newStrokes.length - 1] = [...currentStroke, coords];
                }
                return newStrokes;
            });
            lastPointRef.current = coords;
        }
      };

      const handleEnd = () => {
        isDraggingRef.current = false;
      };

      // --- Rendering Loop ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !containerRef.current) return;

        const containerWidth = containerRef.current.clientWidth;
        const displayWidth = Math.min(containerWidth, 1200); 
        const courtDisplayHeight = displayWidth / ASPECT_RATIO;
        const MARGIN_TOP = 50;
        const MARGIN_BOTTOM = 80;
        const displayHeight = courtDisplayHeight + MARGIN_TOP + MARGIN_BOTTOM;
        const dpr = window.devicePixelRatio || 1;
        
        canvas.width = displayWidth * dpr;
        canvas.height = displayHeight * dpr;
        canvas.style.width = `${displayWidth}px`;
        canvas.style.height = `${displayHeight}px`;

        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        // Global background (for transparent png export safety)
        ctx.fillStyle = '#0f172a'; // slate-900
        ctx.fillRect(0, 0, displayWidth, displayHeight);

        // 1. Draw Scoring Direction Arrow (Above the Court)
        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; 
        const arrowLen = displayWidth * 0.15;
        const arrowThick = 4;
        const headSize = 14;
        const cx = displayWidth / 2;
        const cy = MARGIN_TOP / 2;

        ctx.beginPath();
        if (scoringDirection === 'right') {
            ctx.moveTo(cx - arrowLen/2, cy - arrowThick/2);
            ctx.lineTo(cx + arrowLen/6, cy - arrowThick/2);
            ctx.lineTo(cx + arrowLen/6, cy - headSize/2);
            ctx.lineTo(cx + arrowLen/2, cy);
            ctx.lineTo(cx + arrowLen/6, cy + headSize/2);
            ctx.lineTo(cx + arrowLen/6, cy + arrowThick/2);
            ctx.lineTo(cx - arrowLen/2, cy + arrowThick/2);
        } else {
            ctx.moveTo(cx + arrowLen/2, cy - arrowThick/2);
            ctx.lineTo(cx - arrowLen/6, cy - arrowThick/2);
            ctx.lineTo(cx - arrowLen/6, cy - headSize/2);
            ctx.lineTo(cx - arrowLen/2, cy);
            ctx.lineTo(cx - arrowLen/6, cy + headSize/2);
            ctx.lineTo(cx - arrowLen/6, cy + arrowThick/2);
            ctx.lineTo(cx + arrowLen/2, cy + arrowThick/2);
        }
        ctx.closePath();
        ctx.fill();

        ctx.font = '12px sans-serif';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.textAlign = 'center';
        ctx.fillText('Scoring Direction', cx, cy - 12);
        ctx.restore();

        // Translate context downwards to make room for the margin
        ctx.save();
        ctx.translate(0, MARGIN_TOP);

        // 2. Draw Court
        drawCourt(ctx, displayWidth, courtDisplayHeight);

        const toPx = (val) => (val / COURT_WIDTH) * displayWidth;
        const toPy = (val) => (val / COURT_HEIGHT) * courtDisplayHeight;

        // 3. Draw Traced Path
        if (strokes.length > 0 && (!showHeatmap || showTrace)) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            strokes.forEach(stroke => {
                if (stroke.length < 1) return;
                ctx.beginPath();
                ctx.moveTo(toPx(stroke[0].x), toPy(stroke[0].y));
                if (stroke.length === 1) {
                    ctx.lineTo(toPx(stroke[0].x) + 1, toPy(stroke[0].y));
                } else {
                    for (let i = 1; i < stroke.length; i++) {
                        ctx.lineTo(toPx(stroke[i].x), toPy(stroke[i].y));
                    }
                }
                ctx.stroke();
            });
            ctx.restore();
        }

        // 4. Heatmap Overlay
        if (showHeatmap && strokes.length > 0) {
            const densityPoints = [];
            const SAMPLING_DIST = 0.3; // meters for interpolation

            strokes.forEach(stroke => {
                if (stroke.length === 0) return;
                densityPoints.push(stroke[0]);

                for (let i = 0; i < stroke.length - 1; i++) {
                    const p1 = stroke[i];
                    const p2 = stroke[i+1];
                    const dist = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
                    
                    if (dist > SAMPLING_DIST) {
                        const steps = Math.floor(dist / SAMPLING_DIST);
                        for (let j = 1; j <= steps; j++) {
                            const t = j / (steps + 1);
                            densityPoints.push({
                                x: p1.x + (p2.x - p1.x) * t,
                                y: p1.y + (p2.y - p1.y) * t
                            });
                        }
                    }
                    densityPoints.push(p2);
                }
            });

            const radius = 22; // Reduced smoothing for precision
            
            const heatCanvas = document.createElement('canvas');
            heatCanvas.width = displayWidth * dpr;
            heatCanvas.height = courtDisplayHeight * dpr;
            const heatCtx = heatCanvas.getContext('2d');
            const scaledRadius = radius * (displayWidth / 800) * dpr; 
            
            densityPoints.forEach(p => {
                const px = toPx(p.x) * dpr;
                const py = toPy(p.y) * dpr; 
                const grad = heatCtx.createRadialGradient(px, py, 0, px, py, scaledRadius);
                const alpha = 0.02; // Reduced threshold, requiring more points to max out
                grad.addColorStop(0, `rgba(0,0,0,${alpha})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                heatCtx.fillStyle = grad;
                heatCtx.fillRect(px - scaledRadius, py - scaledRadius, scaledRadius * 2, scaledRadius * 2);
            });

            const heatImage = heatCtx.getImageData(0, 0, heatCanvas.width, heatCanvas.height);
            const heatData = heatImage.data;
            
            for (let i = 0; i < heatData.length; i += 4) {
              const alphaVal = heatData[i + 3];
              if (alphaVal > 0) {
                const paletteIndex = Math.min(alphaVal * 3, 255) * 4; 
                heatData[i] = palette[paletteIndex];     
                heatData[i + 1] = palette[paletteIndex + 1]; 
                heatData[i + 2] = palette[paletteIndex + 2]; 
                heatData[i + 3] = alphaVal > 5 ? 180 : 0; // Cutoff for noise
              }
            }
            heatCtx.putImageData(heatImage, 0, 0);
            ctx.drawImage(heatCanvas, 0, 0, displayWidth, courtDisplayHeight);
        }

        // 5. Draw Event Markers
        if (events.length > 0) {
            ctx.save();
            events.forEach(ev => {
                const px = toPx(ev.x);
                const py = toPy(ev.y);
                
                ctx.save();
                ctx.translate(px, py);
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.lineWidth = 2.5;

                // Normalize size of icons
                ctx.scale(0.8, 0.8);
                ctx.translate(-12, -12);
                
                let pathStr = "";

                switch(ev.type) {
                    case 'pass_success':
                        ctx.strokeStyle = '#10b981'; // Green
                        ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
                        pathStr = "M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M6 14v-1a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M18 11v4.929a2 2 0 0 1-.586 1.414l-5.828 5.828a2 2 0 0 1-2.829 0l-5.828-5.828A2 2 0 0 1 4 15.93V14";
                        break;
                    case 'pass_fail':
                        ctx.strokeStyle = '#ef4444'; // Red
                        ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                        pathStr = "M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M6 14v-1a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M18 11v4.929a2 2 0 0 1-.586 1.414l-5.828 5.828a2 2 0 0 1-2.829 0l-5.828-5.828A2 2 0 0 1 4 15.93V14";
                        break;
                    case 'intercept':
                        ctx.strokeStyle = '#3b82f6'; // Blue for shield
                        ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                        pathStr = "M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z";
                        break;
                    case 'shot_success':
                        ctx.strokeStyle = '#10b981'; 
                        ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
                        pathStr = "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 18a6 6 0 100-12 6 6 0 000 12z M12 14a2 2 0 100-4 2 2 0 000 4z";
                        break;
                    case 'shot_fail':
                        ctx.strokeStyle = '#ef4444'; 
                        ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                        pathStr = "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 18a6 6 0 100-12 6 6 0 000 12z M12 14a2 2 0 100-4 2 2 0 000 4z";
                        break;
                    default:
                        break;
                }

                if (pathStr) {
                    const p = new Path2D(pathStr);
                    ctx.fill(p);
                    ctx.stroke(p);
                }
                ctx.restore();
            });
            ctx.restore();
        }
        
        ctx.restore(); // Undo the court margin translation

        // 6. Draw Stats Footer for Export
        ctx.save();
        ctx.translate(0, MARGIN_TOP + courtDisplayHeight);

        // Footer background separator
        ctx.strokeStyle = '#334155'; // border-slate-700
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(displayWidth, 0);
        ctx.stroke();

        // Footer Text
        ctx.fillStyle = '#cbd5e1'; // text-slate-300
        ctx.font = `${Math.max(12, displayWidth * 0.015)}px sans-serif`; 
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';

        const col1 = Math.max(10, displayWidth * 0.05);
        const col2 = Math.max(120, displayWidth * 0.35);
        const col3 = Math.max(220, displayWidth * 0.65);

        ctx.fillText(`Player: ${metadata.playerName || 'N/A'} (${metadata.position})`, col1, 20);
        ctx.fillText(`Observer: ${metadata.observerName || 'N/A'}`, col1, 45);

        ctx.fillText(`Distance: ${stats.distance} m`, col2, 20);
        ctx.fillText(`Intercepts: ${stats.ints}`, col2, 45);

        ctx.fillText(`Passes: ${stats.totalPasses}  (${stats.passSuccess}✓ ${stats.passFail}✗)  | Acc: ${stats.passAcc}`, col3, 20);
        ctx.fillText(`Shots: ${stats.totalShots}  (${stats.shotSuccess}✓ ${stats.shotFail}✗)  | Acc: ${stats.shotAcc}`, col3, 45);

        ctx.restore();

      }, [strokes, events, showHeatmap, palette, showTrace, scoringDirection, stats, metadata]);

      const handleMetadataChange = (e) => {
          setMetadata(prev => ({ ...prev, [e.target.name]: e.target.value }));
      };

      return (
        <div className="flex flex-col items-center min-h-screen bg-slate-900 text-slate-100 p-6 font-sans overflow-y-auto">
          
          <div className="w-full max-w-7xl mb-6 flex justify-between items-center flex-wrap gap-4">
            <div>
              <div className="flex items-center gap-3">
                <h1 className="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                  Netball Vision
                </h1>
                <span className="px-2 py-1 bg-slate-800 text-slate-400 text-xs rounded-full border border-slate-700">Court Tracker</span>
              </div>
              <p className="text-slate-400 text-sm">Interactive Tracking & Analytics</p>
            </div>
            <div className="flex gap-3">
                 <button 
                    onClick={handleDownload}
                    className="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors border border-slate-600"
                >
                    <Icon name="download" size={16} /> Export
                </button>
            </div>
          </div>

          {/* Main Workspace */}
          <div className="flex flex-col xl:flex-row gap-6 w-full max-w-7xl">
            
            {/* Controls Panel */}
            <div className="w-full xl:w-80 flex flex-col gap-6 bg-slate-800 p-5 rounded-xl border border-slate-700 shrink-0">
              
              {/* Form / Metadata */}
              <div className="space-y-3">
                 <div className="flex items-center gap-2 text-blue-300 font-semibold border-b border-slate-700 pb-2">
                  <Icon name="clipboard" size={18} /> Match Details
                </div>
                <div className="space-y-2">
                    <div className="relative">
                        <Icon name="user" className="absolute left-3 top-2.5 text-slate-500" size={14} />
                        <input 
                            type="text" name="playerName" value={metadata.playerName} onChange={handleMetadataChange}
                            placeholder="Player Name" 
                            className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-blue-500"
                        />
                    </div>
                    <div className="flex gap-2">
                        <div className="relative flex-1">
                            <Icon name="map-pin" className="absolute left-3 top-2.5 text-slate-500" size={14} />
                            <select 
                                name="position" value={metadata.position} onChange={handleMetadataChange}
                                className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-blue-500 appearance-none"
                            >
                                <option value="GS">GS</option>
                                <option value="GA">GA</option>
                                <option value="WA">WA</option>
                                <option value="C">C</option>
                                <option value="WD">WD</option>
                                <option value="GD">GD</option>
                                <option value="GK">GK</option>
                            </select>
                        </div>
                        <div className="relative flex-1">
                            <Icon name="user" className="absolute left-3 top-2.5 text-slate-500" size={14} />
                            <input 
                                type="text" name="observerName" value={metadata.observerName} onChange={handleMetadataChange}
                                placeholder="Observer" 
                                className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-blue-500"
                            />
                        </div>
                    </div>
                    {/* Scoring Direction Toggle */}
                    <div className="flex items-center gap-2 pt-1">
                        <span className="text-xs text-slate-400 font-medium w-16">Scoring:</span>
                        <button
                            onClick={() => setScoringDirection(prev => prev === 'right' ? 'left' : 'right')}
                            className="flex-1 flex items-center justify-center gap-2 py-1.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-slate-300 hover:bg-slate-800 transition-colors"
                        >
                            {scoringDirection === 'right' ? (
                                <React.Fragment>Right <Icon name="arrow-right" size={14} className="text-blue-400" /></React.Fragment>
                            ) : (
                                <React.Fragment><Icon name="arrow-left" size={14} className="text-blue-400" /> Left</React.Fragment>
                            )}
                        </button>
                    </div>
                </div>
              </div>

              {/* Stats Dashboard */}
              <div className="space-y-3">
                 <div className="flex items-center gap-2 text-emerald-300 font-semibold border-b border-slate-700 pb-2">
                  <Icon name="activity" size={18} /> Performance
                </div>
                <div className="grid grid-cols-2 gap-2">
                    {/* Distance Card */}
                    <div className="bg-slate-900/50 p-2.5 rounded-lg border border-slate-700 flex flex-col justify-center">
                        <div className="text-slate-400 text-xs flex items-center gap-1 mb-1"><Icon name="move" size={12}/> Distance</div>
                        <div className="text-lg font-bold text-white">{stats.distance} <span className="text-xs font-normal text-slate-500">m</span></div>
                    </div>
                    {/* Intercepts Card */}
                    <div className="bg-slate-900/50 p-2.5 rounded-lg border border-slate-700 flex flex-col justify-center">
                        <div className="text-slate-400 text-xs flex items-center gap-1 mb-1"><Icon name="shield-alert" size={12}/> Intercepts</div>
                        <div className="text-lg font-bold text-amber-400">{stats.ints}</div>
                    </div>
                    {/* Passes Card */}
                    <div className="bg-slate-900/50 p-2.5 rounded-lg border border-slate-700">
                        <div className="text-slate-400 text-xs flex items-center justify-between mb-1">
                            <div className="flex items-center gap-1"><Icon name="hand" size={12}/> Passes</div>
                            <span className="text-[10px]">{stats.totalPasses} Total</span>
                        </div>
                        <div className="flex items-baseline gap-2">
                            <div className="text-lg font-bold text-emerald-400">{stats.passAcc}</div>
                            <div className="text-[10px] text-slate-400 flex gap-1 font-medium">
                                <span className="text-emerald-500">{stats.passSuccess}✓</span> 
                                <span className="text-red-500">{stats.passFail}✗</span>
                            </div>
                        </div>
                    </div>
                    {/* Shots Card */}
                    <div className="bg-slate-900/50 p-2.5 rounded-lg border border-slate-700">
                        <div className="text-slate-400 text-xs flex items-center justify-between mb-1">
                            <div className="flex items-center gap-1"><Icon name="target" size={12}/> Shots</div>
                            <span className="text-[10px]">{stats.totalShots} Total</span>
                        </div>
                        <div className="flex items-baseline gap-2">
                            <div className="text-lg font-bold text-blue-400">{stats.shotAcc}</div>
                            <div className="text-[10px] text-slate-400 flex gap-1 font-medium">
                                <span className="text-emerald-500">{stats.shotSuccess}✓</span> 
                                <span className="text-red-500">{stats.shotFail}✗</span>
                            </div>
                        </div>
                    </div>
                </div>
              </div>

              {/* Event Logging (Dynamic Action Menu) */}
              <div className="space-y-3">
                <div className="flex items-center gap-2 text-blue-300 font-semibold border-b border-slate-700 pb-2">
                  <Icon name="zap" size={18} /> Log Actions
                </div>
                <div className="text-[11px] text-slate-400 italic mb-2">Select an action to log it at your last drawn position.</div>
                <div className="grid grid-cols-2 gap-2">
                    <button onClick={() => logEvent('pass_success')} className="flex flex-col items-center justify-center p-2 bg-emerald-900/30 hover:bg-emerald-800/50 border border-emerald-700/50 rounded-lg text-xs font-medium text-emerald-200 transition-colors">
                        <Icon name="hand" size={16} className="mb-1 text-emerald-400"/> Pass (✓)
                    </button>
                    <button onClick={() => logEvent('pass_fail')} className="flex flex-col items-center justify-center p-2 bg-red-900/30 hover:bg-red-800/50 border border-red-700/50 rounded-lg text-xs font-medium text-red-200 transition-colors">
                        <Icon name="hand" size={16} className="mb-1 text-red-400"/> Pass (✗)
                    </button>
                    <button onClick={() => logEvent('shot_success')} className="flex flex-col items-center justify-center p-2 bg-blue-900/30 hover:bg-blue-800/50 border border-blue-700/50 rounded-lg text-xs font-medium text-blue-200 transition-colors">
                        <Icon name="target" size={16} className="mb-1 text-emerald-400"/> Shot (✓)
                    </button>
                    <button onClick={() => logEvent('shot_fail')} className="flex flex-col items-center justify-center p-2 bg-orange-900/30 hover:bg-orange-800/50 border border-orange-700/50 rounded-lg text-xs font-medium text-orange-200 transition-colors">
                        <Icon name="target" size={16} className="mb-1 text-red-400"/> Shot (✗)
                    </button>
                    <button onClick={() => logEvent('intercept')} className="col-span-2 flex items-center justify-center gap-2 p-2 bg-indigo-900/30 hover:bg-indigo-800/50 border border-indigo-700/50 rounded-lg text-xs font-medium text-indigo-200 transition-colors">
                        <Icon name="shield" size={16} className="text-indigo-400"/> Interception
                    </button>
                </div>
              </div>

              {/* Core Controls */}
              <div className="space-y-3 pt-2 border-t border-slate-700">
                <button 
                    onClick={() => setIsDrawingMode(!isDrawingMode)}
                    className={`w-full py-2.5 rounded-lg font-bold transition-all flex items-center justify-center gap-2 border text-sm ${
                        isDrawingMode 
                        ? 'bg-slate-700 text-white border-blue-500/50' 
                        : 'bg-slate-800 text-slate-400 border-slate-700'
                    }`}
                >
                    <Icon name="pen-tool" size={16} /> {isDrawingMode ? 'Drawing Active' : 'Drawing Paused'}
                </button>

                 <button 
                  onClick={() => { if(strokes.length > 0) setShowHeatmap(!showHeatmap) }}
                  disabled={strokes.length === 0}
                  className={`w-full py-3 rounded-lg font-bold transition-all shadow-lg flex items-center justify-center gap-2 text-sm ${
                      showHeatmap
                      ? 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                      : 'bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-500 hover:to-emerald-500 text-white'
                  } ${strokes.length === 0 ? 'opacity-50 cursor-not-allowed' : ''}`}
                >
                  {showHeatmap ? (
                      <React.Fragment><Icon name="layers" size={18}/> Edit Paths</React.Fragment>
                  ) : (
                      <React.Fragment><Icon name="play-circle" size={18}/> Generate Heatmap</React.Fragment>
                  )}
                </button>
                
                <button 
                  onClick={handleClear}
                  className="w-full py-2 bg-red-900/20 hover:bg-red-900/40 text-red-200 rounded-lg border border-red-900/50 transition-colors flex justify-center items-center gap-2 text-sm"
                >
                  <Icon name="trash-2" size={14} /> Clear Board
                </button>

                {/* Path Visibility Control */}
                {showHeatmap && (
                    <button
                        onClick={() => setShowTrace(!showTrace)}
                        className="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700 transition-colors flex justify-center items-center gap-2 text-sm mt-2"
                    >
                        {showTrace ? <Icon name="eye-off" size={14} /> : <Icon name="eye" size={14} />}
                        {showTrace ? 'Hide Trace Path' : 'Show Trace Path'}
                    </button>
                )}
              </div>

            </div>

            {/* Canvas Area */}
            <div 
                ref={containerRef} 
                className={`flex-1 bg-black rounded-xl border border-slate-700 shadow-2xl overflow-hidden relative flex items-center justify-center min-h-[400px] select-none ${isDrawingMode ? 'cursor-crosshair' : ''}`}
            >
              <canvas 
                ref={canvasRef} 
                className="max-w-full touch-none"
                onMouseDown={handleStart}
                onMouseMove={handleMove}
                onMouseUp={handleEnd}
                onMouseLeave={handleEnd}
                onTouchStart={handleStart}
                onTouchMove={handleMove}
                onTouchEnd={handleEnd}
              />
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
