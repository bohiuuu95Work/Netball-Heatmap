<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netball Vision - Court Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (translates React JSX into browser-readable JS) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  
  <!-- The app will be injected here -->
  <div id="root"></div>

  <!-- App Logic -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;
    const { Settings, Download, PenTool, Trash2, Layers, PlayCircle, Activity, Move, Zap, Eye, EyeOff, Check, X, ShieldAlert, Target, User, Clipboard, MapPin, ArrowRight, ArrowLeft, Hand, Shield } = lucideReact;

    const COURT_WIDTH = 30.5;
    const COURT_HEIGHT = 15.25;
    const ASPECT_RATIO = COURT_WIDTH / COURT_HEIGHT;

    // --- Helper: Generate Color Gradient (Blue -> Green -> Yellow -> Orange -> Red) ---
    const createGradientPalette = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 1;
      const ctx = canvas.getContext('2d');
      
      const grad = ctx.createLinearGradient(0, 0, 256, 0);
      grad.addColorStop(0.0, 'rgba(0, 0, 255, 0)');     
      grad.addColorStop(0.1, 'rgba(0, 0, 255, 0.8)');   
      grad.addColorStop(0.35, 'rgba(0, 255, 0, 0.9)');  
      grad.addColorStop(0.55, 'rgba(255, 255, 0, 0.9)');
      grad.addColorStop(0.75, 'rgba(255, 165, 0, 0.9)');
      grad.addColorStop(1.0, 'rgba(255, 0, 0, 1.0)');   

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 1);
      return ctx.getImageData(0, 0, 256, 1).data;
    };

    // --- Helper: Draw Netball Court ---
    const drawCourt = (ctx, width, height) => {
      const scale = width / COURT_WIDTH;
      const lineColor = 'rgba(255, 255, 255, 0.8)';
      const courtColor = '#1e293b'; // Slate 800 to match dashboard, keeps it clean

      // Background
      ctx.fillStyle = courtColor;
      ctx.fillRect(0, 0, width, height);

      ctx.lineWidth = 2;
      ctx.strokeStyle = lineColor;
      ctx.lineCap = 'round';

      const X = (val) => val * scale;
      const Y = (val) => val * scale;
      
      // Outer boundary
      ctx.strokeRect(X(0), Y(0), X(COURT_WIDTH), Y(COURT_HEIGHT));

      // Transverse Lines (dividing into thirds: 10.166m each)
      const third = COURT_WIDTH / 3;
      ctx.beginPath();
      ctx.moveTo(X(third), Y(0));
      ctx.lineTo(X(third), Y(COURT_HEIGHT));
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(X(third * 2), Y(0));
      ctx.lineTo(X(third * 2), Y(COURT_HEIGHT));
      ctx.stroke();

      // Center Circle (Radius 0.9m)
      ctx.beginPath();
      ctx.arc(X(COURT_WIDTH / 2), Y(COURT_HEIGHT / 2), X(0.9), 0, Math.PI * 2);
      ctx.stroke();

      // Goal Circles (Semi-circles, Radius 4.9m)
      // Left Goal Circle
      ctx.beginPath();
      ctx.arc(X(0), Y(COURT_HEIGHT / 2), X(4.9), -Math.PI / 2, Math.PI / 2);
      ctx.stroke();

      // Right Goal Circle (Fixed facing inwards)
      ctx.beginPath();
      ctx.arc(X(COURT_WIDTH), Y(COURT_HEIGHT / 2), X(4.9), Math.PI / 2, 3 * Math.PI / 2);
      ctx.stroke();
      
      // Goal Posts (Highlighted icons)
      ctx.fillStyle = '#f59e0b'; // Amber-500
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.arc(X(0), Y(COURT_HEIGHT / 2), X(0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(X(COURT_WIDTH), Y(COURT_HEIGHT / 2), X(0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    };

    function App() {
      // Player metadata
      const [metadata, setMetadata] = useState({
          playerName: '',
          observerName: '',
          position: 'C'
      });

      const [scoringDirection, setScoringDirection] = useState('right');

      const [strokes, setStrokes] = useState([]); 
      const [events, setEvents] = useState([]); // { type, x, y, timestamp }
      const [showHeatmap, setShowHeatmap] = useState(false);
      
      const [isDrawingMode, setIsDrawingMode] = useState(true); 
      const [showTrace, setShowTrace] = useState(true); 
      
      const [stats, setStats] = useState({ 
        distance: 0, 
        totalPasses: 0, passSuccess: 0, passFail: 0, passAcc: '0%', 
        totalShots: 0, shotSuccess: 0, shotFail: 0, shotAcc: '0%', 
        ints: 0 
      });

      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const isDraggingRef = useRef(false);
      const lastPointRef = useRef(null);
      
      const palette = useMemo(() => createGradientPalette(), []);

      // --- Calculations ---
      useEffect(() => {
        let totalDist = 0;

        // Calculate Distance
        strokes.forEach(stroke => {
            if (stroke.length < 2) return;
            for (let i = 1; i < stroke.length; i++) {
                const p1 = stroke[i-1];
                const p2 = stroke[i];
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                totalDist += Math.sqrt(dx*dx + dy*dy);
            }
        });

        // Calculate Event Stats
        const passSuccess = events.filter(e => e.type === 'pass_success').length;
        const passFail = events.filter(e => e.type === 'pass_fail').length;
        const totalPasses = passSuccess + passFail;
        
        const shotSuccess = events.filter(e => e.type === 'shot_success').length;
        const shotFail = events.filter(e => e.type === 'shot_fail').length;
        const totalShots = shotSuccess + shotFail;
        
        const ints = events.filter(e => e.type === 'intercept').length;

        setStats({
            distance: Math.round(totalDist),
            totalPasses, passSuccess, passFail,
            passAcc: totalPasses > 0 ? `${Math.round((passSuccess / totalPasses) * 100)}%` : '-',
            totalShots, shotSuccess, shotFail,
            shotAcc: totalShots > 0 ? `${Math.round((shotSuccess / totalShots) * 100)}%` : '-',
            ints: ints
        });

      }, [strokes, events]);

      // --- Actions ---
      const handleDownload = () => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const link = document.createElement('a');
          link.download = `netball-${metadata.playerName || 'analysis'}.png`;
          link.href = canvas.toDataURL();
          link.click();
      };

      const handleClear = () => {
          setStrokes([]);
          setEvents([]);
          setShowHeatmap(false);
          setIsDrawingMode(true);
          setShowTrace(true);
          lastPointRef.current = null;
      };

      const logEvent = (type) => {
          // Use last known drawn point, or default to center of the court
          const pos = lastPointRef.current || { x: COURT_WIDTH / 2, y: COURT_HEIGHT / 2 };
          setEvents(prev => [...prev, { ...pos, type, t: Date.now() }]);
      };

      // --- Interactive Drawing Handlers ---
      const getCourtCoordinates = (clientX, clientY) => {
        const canvas = canvasRef.current;
        if (!canvas) return null;
        
        const rect = canvas.getBoundingClientRect();
        const MARGIN_TOP = 50;
        const MARGIN_BOTTOM = 80; // For stats export footer

        const x = clientX - rect.left;
        const y = clientY - rect.top - MARGIN_TOP; 
        
        const courtDisplayHeight = rect.height - MARGIN_TOP - MARGIN_BOTTOM;
        
        const courtX = (x / rect.width) * COURT_WIDTH;
        const courtY = (y / courtDisplayHeight) * COURT_HEIGHT;
        
        return { 
            x: Math.max(0, Math.min(COURT_WIDTH, courtX)), 
            y: Math.max(0, Math.min(COURT_HEIGHT, courtY)),
            t: Date.now()
        };
      };

      const handleStart = (e) => {
        if (!isDrawingMode) return;
        if (showHeatmap) setShowHeatmap(false);

        isDraggingRef.current = true;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const coords = getCourtCoordinates(clientX, clientY);
        if (coords) {
            setStrokes(prev => [...prev, [coords]]);
            lastPointRef.current = coords;
        }
      };

      const handleMove = (e) => {
        if (!isDrawingMode || !isDraggingRef.current) return;
        if(e.cancelable && e.type === 'touchmove') e.preventDefault();

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const coords = getCourtCoordinates(clientX, clientY);
        
        if (coords) {
            if (lastPointRef.current) {
                const dx = coords.x - lastPointRef.current.x;
                const dy = coords.y - lastPointRef.current.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 0.2) return; // Throttled sampling distance
            }

            setStrokes(prev => {
                const newStrokes = [...prev];
                const currentStroke = newStrokes[newStrokes.length - 1];
                if (currentStroke) {
                    newStrokes[newStrokes.length - 1] = [...currentStroke, coords];
                }
                return newStrokes;
            });
            lastPointRef.current = coords;
        }
      };

      const handleEnd = () => {
        isDraggingRef.current = false;
      };

      // --- Rendering Loop ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !containerRef.current) return;

        const containerWidth = containerRef.current.clientWidth;
        const displayWidth = Math.min(containerWidth, 1200); 
        const courtDisplayHeight = displayWidth / ASPECT_RATIO;
        const MARGIN_TOP = 50;
        const MARGIN_BOTTOM = 80;
        const displayHeight = courtDisplayHeight + MARGIN_TOP + MARGIN_BOTTOM;
        const dpr = window.devicePixelRatio || 1;
        
        canvas.width = displayWidth * dpr;
        canvas.height = displayHeight * dpr;
        canvas.style.width = `${displayWidth}px`;
        canvas.style.height = `${displayHeight}px`;

        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        // Global background (for transparent png export safety)
        ctx.fillStyle = '#0f172a'; // slate-900
        ctx.fillRect(0, 0, displayWidth, displayHeight);

        // 1. Draw Scoring Direction Arrow (Above the Court)
        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; 
        const arrowLen = displayWidth * 0.15;
        const arrowThick = 4;
        const headSize = 14;
        const cx = displayWidth / 2;
        const cy = MARGIN_TOP / 2;

        ctx.beginPath();
        if (scoringDirection === 'right') {
            ctx.moveTo(cx - arrowLen/2, cy - arrowThick/2);
            ctx.lineTo(cx + arrowLen/6, cy - arrowThick/2);
            ctx.lineTo(cx + arrowLen/6, cy - headSize/2);
            ctx.lineTo(cx + arrowLen/2, cy);
            ctx.lineTo(cx + arrowLen/6, cy + headSize/2);
            ctx.lineTo(cx + arrowLen/6, cy + arrowThick/2);
            ctx.lineTo(cx - arrowLen/2, cy + arrowThick/2);
        } else {
            ctx.moveTo(cx + arrowLen/2, cy - arrowThick/2);
            ctx.lineTo(cx - arrowLen/6, cy - arrowThick/2);
            ctx.lineTo(cx - arrowLen/6, cy - headSize/2);
            ctx.lineTo(cx - arrowLen/2, cy);
            ctx.lineTo(cx - arrowLen/6, cy + headSize/2);
            ctx.lineTo(cx - arrowLen/6, cy + arrowThick/2);
            ctx.lineTo(cx + arrowLen/2, cy + arrowThick/2);
        }
        ctx.closePath();
        ctx.fill();

        ctx.font = '12px sans-serif';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.textAlign = 'center';
        ctx.fillText('Scoring Direction', cx, cy - 12);
        ctx.restore();

        // Translate context downwards to make room for the margin
        ctx.save();
        ctx.translate(0, MARGIN_TOP);

        // 2. Draw Court
        drawCourt(ctx, displayWidth, courtDisplayHeight);

        const toPx = (val) => (val / COURT_WIDTH) * displayWidth;
        const toPy = (val) => (val / COURT_HEIGHT) * courtDisplayHeight;

        // 3. Draw Traced Path
        if (strokes.length > 0 && (!showHeatmap || showTrace)) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            strokes.forEach(stroke => {
                if (stroke.length < 1) return;
                ctx.beginPath();
                ctx.moveTo(toPx(stroke[0].x), toPy(stroke[0].y));
                if (stroke.length === 1) {
                    ctx.lineTo(toPx(stroke[0].x) + 1, toPy(stroke[0].y));
                } else {
                    for (let i = 1; i < stroke.length; i++) {
                        ctx.lineTo(toPx(stroke[i].x), toPy(stroke[i].y));
                    }
                }
                ctx.stroke();
            });
            ctx.restore();
        }

        // 4. Heatmap Overlay
        if (showHeatmap && strokes.length > 0) {
            const densityPoints = [];
            const SAMPLING_DIST = 0.3; // meters for interpolation

            strokes.forEach(stroke => {
                if (stroke.length === 0) return;
                densityPoints.push(stroke[0]);

                for (let i = 0; i < stroke.length - 1; i++) {
                    const p1 = stroke[i];
                    const p2 = stroke[i+1];
                    const dist = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
                    
                    if (dist > SAMPLING_DIST) {
                        const steps = Math.floor(dist / SAMPLING_DIST);
                        for (let j = 1; j <= steps; j++) {
                            const t = j / (steps + 1);
                            densityPoints.push({
                                x: p1.x + (p2.x - p1.x) * t,
                                y: p1.y + (p2.y - p1.y) * t
                            });
                        }
                    }
                    densityPoints.push(p2);
                }
            });

            const radius = 22; // Reduced smoothing for precision
            
            const heatCanvas = document.createElement('canvas');
            heatCanvas.width = displayWidth * dpr;
            heatCanvas.height = courtDisplayHeight * dpr;
            const heatCtx = heatCanvas.getContext('2d');
            const scaledRadius = radius * (displayWidth / 800) * dpr; 
            
            densityPoints.forEach(p => {
                const px = toPx(p.x) * dpr;
                const py = toPy(p.y) * dpr; 
                const grad = heatCtx.createRadialGradient(px, py, 0, px, py, scaledRadius);
                const alpha = 0.02; // Reduced threshold, requiring more points to max out
                grad.addColorStop(0, `rgba(0,0,0,${alpha})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                heatCtx.fillStyle = grad;
                heatCtx.fillRect(px - scaledRadius, py - scaledRadius, scaledRadius * 2, scaledRadius * 2);
            });

            const heatImage = heatCtx.getImageData(0, 0, heatCanvas.width, heatCanvas.height);
            const heatData = heatImage.data;
            
            for (let i = 0; i < heatData.length; i += 4) {
              const alphaVal = heatData[i + 3];
              if (alphaVal > 0) {
                const paletteIndex = Math.min(alphaVal * 3, 255) * 4; 
                heatData[i] = palette[paletteIndex];     
                heatData[i + 1] = palette[paletteIndex + 1]; 
                heatData[i + 2] = palette[paletteIndex + 2]; 
                heatData[i + 3] = alphaVal > 5 ? 180 : 0; // Cutoff for noise
              }
            }
            heatCtx.putImageData(heatImage, 0, 0);
            ctx.drawImage(heatCanvas, 0, 0, displayWidth, courtDisplayHeight);
        }

        // 5. Draw Event Markers
        if (events.length > 0) {
            ctx.save();
            events.forEach(ev => {
                const px = toPx(ev.x);
                const py = toPy(ev.y);
                
                ctx.save();
                ctx.translate(px, py);
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.lineWidth = 2.5;

                // Normalize size of icons
                ctx.scale(0.8, 0.8);
                ctx.translate(-12, -12);
                
                let pathStr = "";

                switch(ev.type) {
                    case 'pass_success':
                        ctx.strokeStyle = '#10b981'; // Green
                        ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
                        pathStr = "M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M6 14v-1a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M18 11v4.929a2 2 0 0 1-.586 1.414l-5.828 5.828a2 2 0 0 1-2.829 0l-5.828-5.828A2 2 0 0 1 4 15.93V14";
                        break;
                    case 'pass_fail':
                        ctx.strokeStyle = '#ef4444'; // Red
                        ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                        pathStr = "M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M6 14v-1a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M18 11v4.929a2 2 0 0 1-.586 1.414l-5.828 5.828a2 2 0 0 1-2.829 0l-5.828-5.828A2 2 0 0 1 4 15.93V14";
                        break;
                    case 'intercept':
                        ctx.strokeStyle = '#3b82f6'; // Blue for shield
                        ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                        pathStr = "M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z";
                        break;
                    case 'shot_success':
                        ctx.strokeStyle = '#10b981'; 
                        ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
                        pathStr = "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 18a6 6 0 100-12 6 6 0 000 12z M12 14a2 2 0 100-4 2 2 0 000 4z";
                        break;
                    case 'shot_fail':
                        ctx.strokeStyle = '#ef4444'; 
                        ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                        pathStr = "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 18a6 6 0 100-12 6 6 0 000 12z M12 14a2 2 0 100-4 2 2 0 000 4z";
                        break;
                    default:
                        break;
                }

                if (pathStr) {
                    const p = new Path2D(pathStr);
                    ctx.fill(p);
                    ctx.stroke(p);
                }
